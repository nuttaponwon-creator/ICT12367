{% extends 'base.html' %}

{% block title %}แบบฟอร์มบันทึกข้อมูลประชากร{% endblock %}

{% block content %}
<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            
            <div class="card shadow-lg border-0 rounded-4">
                
                <div class="card-header bg-primary text-white text-center py-4" style="border-top-left-radius: 1rem; border-top-right-radius: 1rem;">
                    <h3 class="mb-2 fw-bold">รายวิชา ICT12367</h3>
                    <h5 class="mb-0 fw-light">แบบฟอร์มบันทึกข้อมูลประชากร</h5>
                </div>
                
                <div class="card-body p-4 p-md-5 bg-white rounded-bottom-4">
                    <form method="post" action="/form/">
                        {% csrf_token %}
                        
                        <div class="mb-4">
                            <label for="name" class="form-label fw-bold text-secondary">ชื่อประชากร</label>
                            <input type="text" class="form-control form-control-lg bg-light" name="name" id="name" placeholder="กรุณากรอกชื่อ-นามสกุล" required>
                        </div>
                        
                        <div class="mb-4">
                            <label for="age" class="form-label fw-bold text-secondary">อายุ</label>
                            <input type="number" class="form-control form-control-lg bg-light" name="age" id="age" placeholder="กรอกข้อมูลอายุเป็นตัวเลข" required>
                        </div>
                        
                        <hr class="my-4 text-muted">

                        <div class="d-grid gap-3 d-md-flex justify-content-md-center">
                            <button type="submit" class="btn btn-success btn-lg px-5 shadow-sm rounded-pill">
                                ลงทะเบียน
                            </button>
                            <button type="reset" class="btn btn-outline-danger btn-lg px-5 shadow-sm rounded-pill">
                                ล้างข้อมูล
                            </button>
                        </div>
                    </form>
                </div>

            </div>
            </div>
    </div>
</div>
{% endblock %}
